<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f1e8" />
    <title>税金回収カウンター</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">図書館で静かに取り返し中</p>
          <h1>税金回収カウンター</h1>
        </div>
        <button class="icon-button" id="themeToggle" type="button" aria-label="表示テーマを切り替え">◐</button>
      </header>

      <section class="view is-active" id="view-dashboard" aria-labelledby="dashboardTitle">
        <div class="month-switcher">
          <button class="ghost-button" id="prevMonth" type="button">‹</button>
          <h2 id="dashboardTitle"></h2>
          <button class="ghost-button" id="nextMonth" type="button">›</button>
        </div>

        <article class="hero-panel" id="dashboardPanel">
          <div class="hero-copy">
            <p class="label">今月の住民税</p>
            <strong id="monthlyTaxDisplay">¥0</strong>
            <span id="monthlyMessage">月額住民税を設定してください。</span>
          </div>
          <div class="gauge-wrap" aria-label="住民税回収ゲージ">
            <div class="gauge-track">
              <div class="gauge-fill" id="gaugeFill"></div>
            </div>
            <div class="gauge-meta">
              <span id="recoveredDisplay">¥0 回収</span>
              <span id="rateDisplay">0%</span>
            </div>
          </div>
        </article>

        <section class="metric-grid" aria-label="今月の集計">
          <article class="metric-card">
            <span>借りた額</span>
            <strong id="borrowedTotal">¥0</strong>
          </article>
          <article class="metric-card">
            <span>読了額</span>
            <strong id="readTotal">¥0</strong>
          </article>
          <article class="metric-card">
            <span>借りた冊数</span>
            <strong id="borrowedCount">0冊</strong>
          </article>
          <article class="metric-card">
            <span>年間回収率</span>
            <strong id="yearRate">0%</strong>
          </article>
        </section>

        <section class="section-block">
          <div class="section-heading">
            <h3>返却が近い本</h3>
            <span id="dueSummary">期限のある本はありません</span>
          </div>
          <div class="book-list compact" id="dueList"></div>
        </section>

        <section class="section-block">
          <div class="section-heading">
            <h3>ダッシュボード案</h3>
            <span>初期検討用</span>
          </div>
          <div class="style-options">
            <button class="style-card is-selected" data-style="library" type="button">
              <span>図書館ベース</span>
              <small>落ち着いた読書アプリ寄り</small>
            </button>
            <button class="style-card" data-style="statement" type="button">
              <span>明細ベース</span>
              <small>控えめな税金通知感</small>
            </button>
            <button class="style-card" data-style="game" type="button">
              <span>大人のミニゲーム</span>
              <small>ゲージ削りを少し強めに</small>
            </button>
          </div>
        </section>
      </section>

      <section class="view" id="view-scan" aria-labelledby="scanTitle">
        <div class="section-heading">
          <h2 id="scanTitle">登録</h2>
          <span>ISBN検索または手入力</span>
        </div>

        <form class="isbn-form" id="isbnForm">
          <label>
            ISBN
            <input id="isbnInput" inputmode="numeric" autocomplete="off" placeholder="978..." />
          </label>
          <button class="primary-button" type="submit">ISBNで検索</button>
        </form>

        <form class="book-form" id="bookForm">
          <div class="section-heading">
            <h3>登録内容</h3>
            <span id="lookupSource">手入力でも登録できます</span>
          </div>
          <label>
            タイトル
            <input id="titleInput" required placeholder="本のタイトル" />
          </label>
          <label>
            価格
            <input id="priceInput" required inputmode="numeric" placeholder="本体価格または税込価格" />
          </label>
          <label>
            著者
            <input id="authorInput" placeholder="任意" />
          </label>
          <label>
            返却期限
            <input id="dueInput" type="date" />
          </label>
          <input id="hiddenIsbn" type="hidden" />
          <button class="primary-button" type="submit">今月に登録</button>
        </form>
      </section>

      <section class="view" id="view-shelf" aria-labelledby="shelfTitle">
        <div class="month-switcher">
          <button class="ghost-button" id="shelfPrevMonth" type="button">‹</button>
          <h2 id="shelfTitle"></h2>
          <button class="ghost-button" id="shelfNextMonth" type="button">›</button>
        </div>
        <div class="section-heading">
          <h3>月ごとの本棚</h3>
          <span id="shelfSummary">0冊</span>
        </div>
        <div class="book-list" id="bookList"></div>
      </section>

      <section class="view" id="view-settings" aria-labelledby="settingsTitle">
        <div class="section-heading">
          <h2 id="settingsTitle">設定</h2>
          <span>まずは月額だけ</span>
        </div>
        <form class="settings-form" id="settingsForm">
          <label>
            月額住民税
            <input id="taxInput" required inputmode="numeric" placeholder="18000" />
          </label>
          <label>
            標準の返却期間
            <select id="loanDaysInput">
              <option value="7">1週間</option>
              <option value="14">2週間</option>
              <option value="21">3週間</option>
              <option value="30">30日</option>
            </select>
          </label>
          <button class="primary-button" type="submit">保存</button>
        </form>

        <section class="section-block">
          <div class="section-heading">
            <h3>将来入れる機能</h3>
            <span>次フェーズ</span>
          </div>
          <ul class="future-list">
            <li>住民税の概算計算</li>
            <li>クラウド同期</li>
            <li>返却期限通知</li>
            <li>気に入った本の購入リンク</li>
          </ul>
        </section>
      </section>
    </main>

    <nav class="tabbar" aria-label="メインナビゲーション">
      <button class="tab is-active" data-tab="dashboard" type="button"><span>今月</span></button>
      <button class="tab" data-tab="scan" type="button"><span>登録</span></button>
      <button class="tab" data-tab="shelf" type="button"><span>本棚</span></button>
      <button class="tab" data-tab="settings" type="button"><span>設定</span></button>
    </nav>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
